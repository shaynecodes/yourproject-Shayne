<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            height: 100vh;
            background: #eef1f5;
        }

        /* Sidebar */
        .sidebar {
            width: 230px;
            background: linear-gradient(180deg, #1e3c72, #2a5298);
            color: white;
            padding: 20px;
        }

        .sidebar h2 {
            margin-bottom: 25px;
            text-align: center;
        }

        .sidebar ul {
            list-style: none;
        }

        .sidebar ul li {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            transition: 0.3s;
            cursor: pointer;
        }

        .sidebar ul li:hover {
            background: rgba(255,255,255,0.2);
            transform: translateX(5px);
        }

        /* Main area */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            background: white;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .header h2 {
            color: #333;
        }

        .header p {
            font-weight: bold;
            color: #555;
        }

        /* Content */
        .content {
            padding: 20px;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        /* Card Design */
        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.15);
        }

        .card h3 {
            color: #777;
            margin-bottom: 10px;
        }

        .card p {
            font-size: 26px;
            font-weight: bold;
            color: #2a5298;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }
        }
    </style>
</head>

<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>My Dashboard</h2>
        <ul>
            <li>🏠 Home</li>
            <li>📊 Analytics</li>
            <li>👥 Users</li>
            <li>⚙️ Settings</li>
        </ul>
    </div>

    <!-- Main -->
    <div class="main">

        <!-- Header -->
        <div class="header">
            <h2>Welcome Back!</h2>
            <p>Admin</p>
        </div>

        <!-- Content -->
        <div class="content">
            <div class="cards">

                <div class="card">
                    <h3>Total Users</h3>
                    <p>1,245</p>
                </div>

                <div class="card">
                    <h3>Sales</h3>
                    <p>₱32,000</p>
                </div>

                <div class="card">
                    <h3>Orders</h3>
                    <p>320</p>
                </div>

                <div class="card">
                    <h3>Revenue</h3>
                    <p>₱120,500</p>
                </div>

            </div>
        </div>

    </div>

</body>
</html>
